<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --preto:#1F1F1F;
  --laranja:#F2685B;
  --bege:#F2E1D1;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#F2E1D1;
color:#1F1F1F;
}

/* HEADER */
header{
background:#1F1F1F;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 10%;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:40px;
}

nav a{
color:#F2685B;
text-decoration:none;
margin-left:25px;
font-weight:bold;
}

nav a:hover{
color:white;
}

/* PRODUTOS */
.produtos{
padding:60px 10%;

text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.produto{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.produto img{
width:100%;
border-radius:8px;
}

.produto button{
margin-top:10px;
background:#F2685B;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
width:100%;
}

/* CARRINHO */
.carrinho{
position:fixed;
right:20px;
bottom:20px;
background:#1F1F1F;
color:white;
padding:15px;
border-radius:10px;
width:260px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.carrinho h3{
text-align:center;
margin-bottom:10px;
}

.carrinho ul{
list-style:none;
max-height:150px;
overflow:auto;
margin-bottom:10px;
}

.carrinho li{
margin-bottom:5px;
font-size:14px;
}

.total{
font-weight:bold;
margin-bottom:10px;
}

.carrinho button{
width:100%;
background:#F2685B;
border:none;
color:white;
padding:10px;
cursor:pointer;
border-radius:5px;
}

/* FOOTER */
footer{
margin-top:40px;
background:#1F1F1F;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>
<div class="logo"> 
<img src="logo.png">
</div>

<nav>
<a href="#">Home</a>
<a href="#produtos">Produtos</a>
</nav>
</header>

<section id="produtos" class="produtos">

<h2>Produtos</h2>

<div class="grid">

<div class="produto">
<img src="01.jpg">
<h3>Camiseta Estampada</h3>
<p>R$59,90</p>
<button onclick="addCarrinho('Camiseta Estampada')">Adicionar</button>
</div>

<div class="produto">
<img src="02.jpg">
<h3>Camiseta Minimal</h3>
<p>R$69,90</p>
<button onclick="addCarrinho('Camiseta Minimal')">Adicionar</button>
</div>

<div class="produto">
<img src="03.jpg">
<h3>Moletom Street</h3>
<p>R$119,90</p>
<button onclick="addCarrinho('Moletom Street')">Adicionar</button>
</div>

<div class="produto">
<img src="04.jpg">
<h3>Moletom Urban</h3>
<p>R$129,90</p>
<button onclick="addCarrinho('Moletom Urban')">Adicionar</button>
</div>

</div>

</section>

<!-- CARRINHO -->
<div class="carrinho">

<h3>🛒 Carrinho</h3>

<ul id="listaCarrinho"></ul>

<p class="total">Total: R$ <span id="total">0.00</span></p>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

</div>

<footer>
<p>© 2026 Estampah!</p>
</footer>

<script>

let carrinho = []

const precos = {
"Camiseta Estampada": 59.9,
"Camiseta Minimal": 69.9,
"Moletom Street": 119.9,
"Moletom Urban": 129.9
}

function addCarrinho(produto){
carrinho.push(produto)
renderCarrinho()
}

function renderCarrinho(){

let lista = document.getElementById("listaCarrinho")
let totalEl = document.getElementById("total")

lista.innerHTML = ""

let resumo = {}
let total = 0

carrinho.forEach(item => {
resumo[item] = (resumo[item] || 0) + 1
})

for(let produto in resumo){
let li = document.createElement("li")
li.textContent = `${resumo[produto]}x ${produto}`
lista.appendChild(li)

total += resumo[produto] * precos[produto]
}

totalEl.textContent = total.toFixed(2)

}

function finalizarPedido(){

if(carrinho.length === 0){
alert("Carrinho vazio")
return
}

// 🔥 COLOQUE SEU NÚMERO
const numero = "5511953724603"

let resumo = {}
let total = 0

carrinho.forEach(item => {
resumo[item] = (resumo[item] || 0) + 1
})

for(let produto in resumo){
total += resumo[produto] * precos[produto]
}

let mensagem = "🛍️ *Novo Pedido - Estampah!*%0A%0A"

mensagem += "📦 *Produtos:*%0A"

for(let produto in resumo){
mensagem += `${resumo[produto]}x ${produto}%0A`
}

mensagem += `%0A💰 *Total:* R$ ${total.toFixed(2)}%0A`
mensagem += "🚚 Frete: a calcular%0A%0A"
mensagem += "👤 Nome:%0A📍 CEP:%0A%0A"
mensagem += "Quero finalizar meu pedido!"

let url = `https://wa.me/${numero}?text=${mensagem}`

window.open(url, "_blank")

carrinho = []
renderCarrinho()

}

</script>

</body>
</html>
